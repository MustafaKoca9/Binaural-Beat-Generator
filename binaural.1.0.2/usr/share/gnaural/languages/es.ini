about_text = Acerca de Binaural Beat Generator\n\nEste programa fue desarrollado para simular los efectos de frecuencias de sonido específicas en el cerebro humano. Al reproducir frecuencias de onda senoidal ligeramente diferentes en los oídos izquierdo y derecho, se crea en el cerebro una tercera frecuencia percibida, igual a la diferencia entre las dos (por ejemplo, una onda Alfa de 10 Hz).\n\nEste método se basa en investigaciones científicas (Heinrich Wilhelm Dove, 1839, y estudios modernos de EEG) que exploran la sincronización de las ondas cerebrales, el aumento del enfoque, la reducción del estrés y la promoción de la relajación profunda.\n\nEste programa se entrega sin ninguna garantía.\n\nDerechos de autor (c) 2026 - A. Serhat KILIÇOĞLU
