about_text = Binaural Beat Generator Hakkında\n\nBu program, insan beyninin belirli frekanslardaki ses dalgalarına verdiği tepkileri simüle etmek amacıyla geliştirilmiştir. Sol ve sağ kulaklara hafifçe farklı frekanslarda sinüs dalgaları verilerek, beyinde bu iki frekansın farkı kadar (örn. 10 Hz Alfa dalgası) üçüncü bir hayali frekans algısı oluşturulur.\n\nBu yöntem, nörolojik çalışmalarda (Heinrich Wilhelm Dove, 1839 ve modern EEG araştırmaları) beyin dalgalarını senkronize etmek, odaklanmayı artırmak, stresi azaltmak ve derin gevşeme sağlamak amacıyla incelenen bilimsel temellere dayanmaktadır.\n\nBu program, hiçbir garanti getirmez.\n\nTelif Hakkı © 2026 - A. Serhat KILIÇOĞLU
