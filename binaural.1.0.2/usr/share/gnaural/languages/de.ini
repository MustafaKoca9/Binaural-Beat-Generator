about_text = Über Binaural Beat Generator\n\nDieses Programm wurde entwickelt, um die Auswirkungen bestimmter Tonfrequenzen auf das menschliche Gehirn zu simulieren. Indem auf dem linken und rechten Ohr leicht unterschiedliche Sinuswellenfrequenzen abgespielt werden, entsteht im Gehirn eine dritte, wahrgenommene Frequenz, die der Differenz zwischen den beiden entspricht (z. B. eine 10-Hz-Alphawelle).\n\nDiese Methode basiert auf wissenschaftlichen Forschungen (Heinrich Wilhelm Dove, 1839, und moderne EEG-Studien), die die Synchronisation von Gehirnwellen, die Steigerung des Fokus, den Stressabbau und die Förderung tiefer Entspannung untersuchen.\n\nDieses Programm wird ohne jegliche Gewährleistung geliefert.\n\nUrheberrecht (c) 2026 - A. Serhat KILIÇOĞLU
