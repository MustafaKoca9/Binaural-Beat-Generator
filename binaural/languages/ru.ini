about_text = О программе Binaural Beat Generator\n\nЭта программа была разработана для моделирования воздействия определенных звуковых частот на человеческий мозг. При воспроизведении в левом и правом ухе слегка отличающихся частот синусоидальной волны в мозге возникает третья, воспринимаемая частота, равная разности между ними (например, альфа-волна 10 Гц).\n\nЭтот метод основан на научных исследованиях (Генрих Вильгельм Дове, 1839 г., и современные исследования ЭЭГ), изучающих синхронизацию мозговых волн, повышение концентрации внимания, снижение стресса и содействие глубокому расслаблению.\n\nЭта программа поставляется без каких-либо гарантий.\n\nАвторское право (c) 2026 - А. Серхат КЫЛЫЧОГЛУ
