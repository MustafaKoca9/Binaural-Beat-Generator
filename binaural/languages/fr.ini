about_text = À propos de Binaural Beat Generator\n\nCe programme a été développé pour simuler les effets de fréquences sonores spécifiques sur le cerveau humain. En diffusant des fréquences d'ondes sinusoïdales légèrement différentes dans les oreilles gauche et droite, une troisième fréquence perçue, égale à la différence entre les deux (par exemple, une onde Alpha de 10 Hz), est générée dans le cerveau.\n\nCette méthode est basée sur des recherches scientifiques (Heinrich Wilhelm Dove, 1839, et des études EEG modernes) explorant la synchronisation des ondes cérébrales, l'augmentation de la concentration, la réduction du stress et la promotion d'une relaxation profonde.\n\nCe programme est fourni sans aucune garantie.\n\nCopyright (c) 2026 - A. Serhat KILIÇOĞLU
